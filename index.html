<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>めでたいメッセージメーカー</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Yusei+Magic&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="launcher" class="screen">
        <div class="panel">
          <p class="eyebrow">誰かを祝いたい人向け</p>
          <h1>めでたいURLを作る</h1>
          <p class="description">
            タイトルと説明を入れると、内容を圧縮した共有URLを作成します。
            そのURLを開くと全画面でお祝い表示になります。
          </p>

          <label class="label" for="titleInput">お祝いタイトル</label>
          <textarea
            id="titleInput"
            rows="2"
            maxlength="140"
            placeholder="例: 昇進おめでとう！！"
          ></textarea>

          <label class="label" for="descInput">お祝い説明</label>
          <textarea
            id="descInput"
            rows="2"
            maxlength="180"
            placeholder="例: すてきな日を、めいっぱい祝おう。"
          ></textarea>

          <button id="buildButton" class="button primary">お祝いURLを作る</button>

          <div class="urlRow">
            <input id="shareUrl" type="text" readonly placeholder="ここにURLが出ます" />
            <button id="copyButton" class="button">コピー</button>
          </div>
          <a id="previewLink" class="button ghost" href="#" target="_blank" rel="noreferrer"
            >別タブで確認</a
          >
        </div>
      </section>

      <section id="celebration" class="screen hidden" aria-live="polite">
        <div id="confettiLayer" aria-hidden="true"></div>
        <div class="celebrationContent">
          <p class="eyebrow">Congratulations!</p>
          <h2 id="celebrationMessage"></h2>
          <p id="celebrationDescription" class="description"></p>
        </div>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
